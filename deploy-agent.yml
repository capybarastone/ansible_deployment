---
- name: Deploy Linux Agents
  hosts: linux
  gather_facts: false

  tasks:
    - name: testing
  

  
    - name: Configure systemd service for backend Herd-agent
      ansible.builtin.copy:
        dest: /etc/systemd/system/herd-agent.service
        content: |
          [Unit]
          Description=Herd Endpoint Agent Service
          After=network.target
          StartLimitIntervalSec=0
          
          [Service]
          Type=simple
          Restart=always
          RestartSec=1
          User=root
          WorkingDirectory=/etc/herd
          ExecStart=/bin/bash -c "/usr/bin/herdagent"
          
          [Install]
          WantedBy=multi-user.target
        owner: root
        group: root
        mode: '0644'
      become: true

    - name: Reload daemon start and enable backend Herd-agent
      ansible.builtin.systemd_service:
        name: herd-agent.service
        enabled: true
        state: restarted
        daemon_reload: true
      become: true

      
  
    - name: Copy exec (linux)
      ansible.builtin.copy:
        src: /home/capped-adm/Documents/endpoint/bin/capyendpoint
        dest: /usr/bin/herdagent
        owner: root
        group: root
        mode: '0755'

    - name: Copy config.toml
      ansible.builtin.copy:
        src: /home/capped-adm/Documents/endpoint/bin/config.toml
        dest: /etc/herd/config.toml
        owner: root
        group: root
        mode: '0644'


- name: Set up capyagent Windows
  hosts: windows
  gather_facts: false

  tasks:
    - name: Copy Endpoint EXE
      ansible.windows.win_copy:
        src: /home/capped-adm/Documents/endpoint/bin/capyendpoint.exe
        dest: C:\Users\deployment\Desktop\capyendppoint.exe

    - name: Copy Endpoint config
      ansible.windows.win_copy:
        src: /home/capped-adm/Documents/endpoint/bin/config.toml
        dest: C:\Users\deployment\Desktop\config.toml
